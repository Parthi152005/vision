{% extends 'layout.html' %}

{% block content %}
<div class="page-header animate-fade-in">
    <h2><i class="fa-solid fa-flask text-blue"></i> Fertilizer Calculator</h2>
    <p>Discover the right fertilizer for your specific crop and soil nutrient levels.</p>
</div>

<div class="content-wrapper animate-slide-up">
    <div class="form-container glass-panel">
        <form id="fertilizer-form" class="ai-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="n-fert">Nitrogen (N)</label>
                    <input type="number" id="n-fert" name="n" placeholder="e.g. 30" required step="any">
                </div>
                <div class="form-group">
                    <label for="p-fert">Phosphorous (P)</label>
                    <input type="number" id="p-fert" name="p" placeholder="e.g. 50" required step="any">
                </div>
                <div class="form-group">
                    <label for="k-fert">Potassium (K)</label>
                    <input type="number" id="k-fert" name="k" placeholder="e.g. 40" required step="any">
                </div>
                <div class="form-group full-width">
                    <label for="crop_type">Target Crop</label>
                    <select id="crop_type" name="crop_type" required>
                        <option value="" disabled selected>Select a crop...</option>
                        <option value="0">Rice</option>
                        <option value="1">Maize</option>
                        <option value="2">Chickpea</option>
                        <option value="3">Cotton</option>
                        <option value="4">Coffee</option>
                        <option value="5">Apple</option>
                        <!-- For simplicity we just provide a few options in dropdown, mapped to integers as per mock training -->
                    </select>
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-primary btn-blue" id="fert-submit-btn">
                    <span>Calculate Fertilizer</span>
                    <i class="fa-solid fa-calculator"></i>
                </button>
            </div>
        </form>
    </div>

    <!-- Result Banner -->
    <div id="fert-result" class="result-banner result-banner-blue hidden">
        <div class="result-icon">
            <i class="fa-solid fa-droplet"></i>
        </div>
        <div class="result-text">
            <h3>Recommended Fertilizer</h3>
            <p id="fert-name" class="highlight-text">Loading...</p>
            <p class="suggestion-text">Apply this nutrient mix to improve soil fertility and crop health.</p>
        </div>
    </div>
</div>
{% endblock %}
